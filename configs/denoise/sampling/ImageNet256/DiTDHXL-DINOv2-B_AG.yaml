stage_2:
  target: denoise.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 32
    hidden_size: [1152, 2048]
    depth: [28, 2]
    num_heads: [16, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.1
    num_classes: 1000
    use_qknorm: False
    use_swiglu: True
    use_rope: True
    use_rmsnorm: True
    wo_shift: False
    use_pos_embed: True
  ckpt: None # 'models/DiTs/Dinov2/wReg_base/ImageNet256/DiTDH-XL/stage2_model.pt'


transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    time_dist_type: 'uniform'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 100
    atol: 1e-6
    rtol: 1e-3
    reverse: False

guidance:
  method: 'autoguidance'
  scale: 1.37
  t-min: 0.0
  t-max: 1.0
  guidance_model:
    target: denoise.models.DDT.DiTwDDTHead
    params:
      input_size: 16
      patch_size: 1
      in_channels: 32
      hidden_size: [1152, 2048]
      depth: [28, 2]
      num_heads: [16, 16]
      mlp_ratio: 4.0
      class_dropout_prob: 0.1
      num_classes: 1000
      use_qknorm: False
      use_swiglu: True
      use_rope: True
      use_rmsnorm: True
      wo_shift: False
      use_pos_embed: True
    ckpt: 'output/sota/0050000.pt'

misc:
  latent_size: [32, 16, 16] # [C, H, W]
  num_classes: 1000
  time_dist_shift_dim:  65536 # 16*16*768
  time_dist_shift_base: 4096